name: Version Bump

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message to determine bump type (e.g. feat: something)'
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve commit message
        id: msg
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PUSH_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_MSG: ${{ github.event.inputs.commit_message }}
        run: |
          if [ -n "$PR_TITLE" ]; then
            echo "value=$PR_TITLE" >> $GITHUB_OUTPUT
          elif [ -n "$DISPATCH_MSG" ]; then
            echo "value=$DISPATCH_MSG" >> $GITHUB_OUTPUT
          else
            echo "value=$PUSH_MSG" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump
        env:
          COMMIT_MSG: ${{ steps.msg.outputs.value }}
        run: |
          OUTPUT=$(node scripts/bump-version.js "$COMMIT_MSG")
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          echo "$OUTPUT"

      - name: Commit version bump
        if: "!startsWith(steps.bump.outputs.output, 'No version bump')"
        env:
          BUMP_OUTPUT: ${{ steps.bump.outputs.output }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/marketplace.json
          git commit -m "chore: $BUMP_OUTPUT [skip ci]"
          git push origin main
