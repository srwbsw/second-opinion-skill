name: Version Bump

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message to determine bump type (e.g. feat: something)'
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve commit message
        id: msg
        env:
          PUSH_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_MSG: ${{ github.event.inputs.commit_message }}
        run: |
          # Use only the first line — GITHUB_OUTPUT rejects multiline values,
          # and the conventional-commit prefix is always on the first line.
          RAW="${DISPATCH_MSG:-$PUSH_MSG}"
          MSG=$(printf '%s' "$RAW" | head -n1)
          echo "value=$MSG" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        env:
          COMMIT_MSG: ${{ steps.msg.outputs.value }}
        run: |
          OUTPUT=$(node scripts/bump-version.js "$COMMIT_MSG")
          echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          echo "$OUTPUT"

      - name: Commit version bump
        if: "!startsWith(steps.bump.outputs.output, 'No version bump')"
        env:
          BUMP_OUTPUT: ${{ steps.bump.outputs.output }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/marketplace.json
          git commit -m "chore: $BUMP_OUTPUT [skip ci]"
          git push origin main
